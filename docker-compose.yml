services:
  db:
    image: postgres:16
    container_name: dsa_tracker_ai_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dsa_tracker_ai_db
    ports:
      - "5434:5432"
    volumes:
      - dsa_tracker_ai_data:/var/lib/postgresql/data

volumes:
  dsa_tracker_ai_data: